name: Consensus Subsystem CI

on:
  push:
    branches: [main]
    paths:
      - 'consensus/**'
      - '.github/workflows/consensus-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'consensus/**'
      - '.github/workflows/consensus-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./consensus

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './consensus/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Compile TypeScript
        run: npm run build

      - name: Run Unit Tests
        run: npm run test
